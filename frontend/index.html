<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zyvexo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#121212" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Space Grotesk (display) + Inter (body) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* === Enterprise Design System === */
    :root {
      --bg-deep: #121212;
      --bg-card: #1f1f1f;
      --bg-elevated: #262626;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --text-muted: #777777;
      --accent-gradient-start: #ff6a10;
      --accent-gradient-end: #f96bee;
      --accent-orange: linear-gradient(90deg, var(--accent-gradient-start), var(--accent-gradient-end));
      --accent-orange-hover: linear-gradient(90deg, #ff8a30, #ff7bee);
      --accent-green: #76b900;
      --accent-purple: #533afd;
      --accent-pink: #f96bee;
      --accent-blue: #38bdf8;
      --border: #2a2a38;
      --border-hover: #3a3a48;
      --shadow-card: rgba(0,0,0,0.4) 0px 12px 24px -6px;
      --shadow-elevated: rgba(0,0,0,0.5) 0px 12px 24px -6px, 0 0 0 1px var(--border);
      --radius: 8px;
      --radius-sm: 4px;
      --radius-lg: 12px;
    }

    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, .font-display { font-family: 'Space Grotesk', sans-serif; }
    code, .font-mono { font-family: 'JetBrains Mono', monospace; }

    /* Glass morphism utilities */
    .glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .glass-strong {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Card elevation */
    .card-elevated {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      transition: all 0.3s ease;
    }
    .card-elevated:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: var(--shadow-card);
    }

    /* Orange gradient border on hover */
    .card-orange:hover::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-orange), var(--accent-purple));
      opacity: 1;
    }

    /* Buttons */
    .btn-primary {
      padding: 14px 32px;
      background: var(--accent-orange);
      color: #fff;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: var(--accent-orange-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(230,90,11,.3);
    }
    .btn-secondary {
      padding: 14px 32px;
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 1rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-secondary:hover {
      border-color: var(--accent-orange);
      color: var(--accent-orange);
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Selection */
    ::selection { background: rgba(230,90,11,.3); color: #fff; }

    /* Audio player dark override */
    audio::-webkit-media-controls-panel { background-color: #1e1b4b; }
  </style>
</head>
<body class="bg-[#121212] text-[#e0e0e0] min-h-screen">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
