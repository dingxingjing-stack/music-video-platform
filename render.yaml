services:
  - type: web
    name: ai-music-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AGNES_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MUREKA_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: TTS_FORCE_MOCK
        value: "true"
      - key: MUSIC_FORCE_MOCK
        value: "true"
      - key: VIDEO_FORCE_MOCK
        value: "true"
      - key: SENTRY_DSN
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
