services:
  - type: web
    name: ai-music-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: AGNES_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # 临时方案：仅启用 agnes（免费主力）。gemini/nvidia 默认关闭，
      # 修复兼容后设 LLM_ENABLE_GEMINI=1 / LLM_ENABLE_NVIDIA=1 重新开启。
      - key: PROVIDER_ORDER
        value: "nvidia"
      - key: NVIDIA_MODEL
        value: "nvidia/llama-3.3-nemotron-super-49b-v1"
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      - key: MUREKA_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: TTS_FORCE_MOCK
        value: "true"
      - key: MUSIC_FORCE_MOCK
        value: "true"
      - key: VIDEO_FORCE_MOCK
        value: "true"
      - key: SENTRY_DSN
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
